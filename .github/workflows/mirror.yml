name: Mirror to personal portfolio

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  mirror:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Push mirror
        env:
          PAT: ${{ secrets.MIRROR_PAT }}
        run: |
          git config --global --unset-all credential.helper || true
          git remote add mirror https://alereginensi:${PAT}@github.com/alereginensi/gss-management-hub.git
          git push mirror main --force
