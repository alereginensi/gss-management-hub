<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <!-- White background -->
  <circle cx="100" cy="100" r="100" fill="white"/>

  <!-- Green segment: top → CCW → lower-left (left side of circle) -->
  <path d="M 100,100 L 100,8 A 92,92 0 0,0 20,146 Z" fill="#6b8f3a"/>

  <!-- Red segment: top → CW → lower-right (right side of circle) -->
  <path d="M 100,100 L 100,8 A 92,92 0 0,1 180,146 Z" fill="#bb2e26"/>

  <!-- Blue segment: lower-right → CW → lower-left (bottom arc) -->
  <path d="M 100,100 L 180,146 A 92,92 0 0,1 20,146 Z" fill="#2471a3"/>

  <!-- White center triangle creating the void -->
  <polygon points="100,52 124,106 76,106" fill="white"/>

  <!-- Head circles (darker shade of each color) -->
  <circle cx="43" cy="128" r="13" fill="#3d5a18"/>
  <circle cx="157" cy="128" r="13" fill="#8b1a10"/>
  <circle cx="100" cy="157" r="16" fill="#1a4a72"/>

  <!-- Outer border ring -->
  <circle cx="100" cy="100" r="95" fill="none" stroke="#3d5269" stroke-width="9"/>
</svg>
